# ANGREN TAXI nginx reverse proxy example.
# Replace example domains, then symlink into /etc/nginx/sites-enabled/.

upstream taxi_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream taxi_admin {
    server 127.0.0.1:3001;
    keepalive 16;
}

server {
    listen 80;
    server_name api.example.com;

    access_log /var/log/nginx/taxi-api.access.log;
    error_log /var/log/nginx/taxi-api.error.log warn;

    location / {
        proxy_pass http://taxi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
    }

    location /health {
        proxy_pass http://taxi_backend/health;
    }
}

server {
    listen 80;
    server_name admin.example.com;

    access_log /var/log/nginx/taxi-admin.access.log;
    error_log /var/log/nginx/taxi-admin.error.log warn;

    location / {
        proxy_pass http://taxi_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
