name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate_postgres_password:
    name: Validate Postgres Password
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
    steps:
      - name: Check POSTGRES_PASSWORD
        run: |
          if [ -z "$POSTGRES_PASSWORD" ]; then
            echo "POSTGRES_PASSWORD must not be empty."
            exit 1
          fi
          if [ "$POSTGRES_PASSWORD" = "taxi" ]; then
            echo "POSTGRES_PASSWORD must not be 'taxi'."
            exit 1
          fi

  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: validate_postgres_password
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: taxi_app
          POSTGRES_USER: taxi
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taxi -d taxi_app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      DATABASE_URL: postgresql://taxi:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/taxi_app?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: ci-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run test:core-flow
      - run: npm run build

  admin:
    name: Admin
    runs-on: ubuntu-latest
    needs: validate_postgres_password
    env:
      NEXT_PUBLIC_API_URL: https://api.example.com
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: admin/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  customer:
    name: Customer App
    runs-on: ubuntu-latest
    needs: validate_postgres_password
    defaults:
      run:
        working-directory: customer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: customer/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test -- --watchAll=false --passWithNoTests

  driver:
    name: Driver App
    runs-on: ubuntu-latest
    needs: validate_postgres_password
    defaults:
      run:
        working-directory: driver
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: driver/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test -- --watchAll=false --passWithNoTests

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, admin, customer, driver]
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker images
        env:
          POSTGRES_DB: taxi_app
          POSTGRES_USER: taxi
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ci-secret
          NEXT_PUBLIC_API_URL: https://api.example.com
          NEXT_PUBLIC_ADMIN_PASSWORD: ${{ secrets.NEXT_PUBLIC_ADMIN_PASSWORD }}
          NEXT_PUBLIC_ADMIN_PHONE: +998900000001
        run: docker compose build backend admin 

  deploy:
    name: Deploy To VPS
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
    steps:
      - name: Check deploy secrets
        id: deploy_config
        run: |
          if [ -n "$VPS_HOST" ] && [ -n "$VPS_USER" ] && [ -n "$VPS_SSH_KEY" ] && [ -n "$VPS_APP_DIR" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "VPS deploy skipped: configure VPS_HOST, VPS_USER, VPS_SSH_KEY and VPS_APP_DIR secrets to enable deploy."
          fi

      - name: Deploy over SSH
        if: steps.deploy_config.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          script: |
            cd ${{ env.VPS_APP_DIR }}
            git pull --ff-only
            docker compose build backend admin
            docker compose up -d postgres redis
            docker compose run --rm migrate
            docker compose up -d backend admin
            docker compose ps
            for i in $(seq 1 30); do
              if docker compose exec -T backend node -e "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"; then
                echo "Backend healthcheck passed."
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "Backend healthcheck failed."
                docker compose logs --tail=200 backend
                exit 1
              fi
              sleep 5
            done
            docker image prune -f
